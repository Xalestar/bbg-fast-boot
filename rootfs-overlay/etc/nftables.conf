table ip nat {
	chain postrouting {
		type nat hook postrouting priority srcnat; policy accept;
		oifname "enu1u1" masquerade
	}
}
table ip filter {
	chain forward {
		type filter hook forward priority filter; policy accept;
		iifname "wlan0" oifname "enu1u1" accept
		iifname "enu1u1" oifname "wlan0" ct state established,related accept
	}
}
