<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BBG-AP Status</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BBG-AP Status</h1>
    
    <section>
        <h2>Access Point</h2>
        <div id="ap-info">Loading...</div>
    </section>
    
    <section>
        <h2>Network Interfaces</h2>
        <div id="network-info">Loading...</div>
    </section>
    
    <section>
        <h2>Connected Clients (<span id="client-count">0</span>)</h2>
        <div id="clients-info">Loading...</div>
    </section>
    
    <section>
        <h2>System</h2>
        <div id="system-info">Loading...</div>
    </section>
    
    <footer>Last updated: <span id="last-update">never</span></footer>
    
    <script src="app.js"></script>
</body>
</html>
